services:
  - type: web
    name: dodge-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
        
  - type: web
    name: dodge-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: ${dodge-api.url}
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
